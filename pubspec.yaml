name: ar_heritage
description: Smarter Heritage – Bhaktapur CV Guide
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  camera: ^0.12.0+1
  tflite_flutter: ^0.12.1
  image: ^4.8.0

  google_fonts: ^8.1.0
  flutter_animate: ^4.5.2

  go_router: ^17.2.3
  permission_handler: ^12.0.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#14151C"
  adaptive_icon_foreground: assets/icon/app_icon.png
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/images/monuments/
    - assets/icon/
