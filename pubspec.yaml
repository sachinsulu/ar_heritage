name: ar_heritage
description: Smarter Heritage – Bhaktapur CV Guide
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Camera & CV ──────────────────────────────────
  # Updated for better Android 14+ support
  camera: ^0.12.0+1
  tflite_flutter: ^0.12.1
  image: ^4.2.0

  # ── UI & Animation ───────────────────────────────
  google_fonts: ^8.1.0
  lottie: ^3.1.2
  flutter_animate: ^4.5.2
  cached_network_image: ^3.4.1

  # ── State Management ─────────────────────────────
  # Note: 3.x introduces some API refinements
  flutter_riverpod: ^3.3.1

  # ── Utils ────────────────────────────────────────
  go_router: ^17.2.3
  permission_handler: ^12.0.1
  path_provider: ^2.1.3
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0 # Standard for modern Flutter projects

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/images/monuments/
    - assets/lottie/