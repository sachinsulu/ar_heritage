name: ar_heritage
description: Smarter Heritage – Bhaktapur CV Guide
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera & CV
  camera: any
  tflite_flutter: any
  image: any

  # UI & Animation
  google_fonts: any
  lottie: any
  flutter_animate: any
  cached_network_image: any

  # State Management
  flutter_riverpod: any

  # Utils
  go_router: any
  permission_handler: any
  path_provider: any
  shared_preferences: any
  http: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/images/monuments/
    - assets/lottie/